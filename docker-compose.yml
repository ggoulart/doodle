services:
  app:
    build: .
    container_name: doodle-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doodle
      SPRING_DATASOURCE_USERNAME: doodle
      SPRING_DATASOURCE_PASSWORD: doodle
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin:8081
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-BASE-URL: http://app:8080
    depends_on:
      postgres:
        condition: service_healthy
      admin:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: doodle-admin
    ports:
      - "8081:8081"

  postgres:
    image: postgres:17-alpine
    container_name: doodle-postgres
    environment:
      POSTGRES_DB: doodle
      POSTGRES_USER: doodle
      POSTGRES_PASSWORD: doodle
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doodle -d doodle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
